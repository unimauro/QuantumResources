name: Deploy Learning Hub (Docusaurus)

on:
  push:
    branches: [master, main]
    paths:
      - 'website/**'
      - 'docs/data.json'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: 🏗️ Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: 🔄 Sync curated data
        # docs/data.json holds the full resource database (500+ books). Copy it
        # into the site before building, but only if it looks valid — never let a
        # stale/empty regeneration degrade the committed dataset.
        run: |
          if [ -f ../docs/data.json ]; then
            count=$(python3 -c "import json;print(json.load(open('../docs/data.json')).get('total_books',0))" 2>/dev/null || echo 0)
            if [ "$count" -gt 50 ]; then
              cp ../docs/data.json src/data/quantum-data.json
              echo "Synced docs/data.json ($count books) -> src/data/quantum-data.json"
            else
              echo "Skipping sync: docs/data.json has only $count books; keeping committed copy."
            fi
          fi

      - name: 📦 Install dependencies
        # npm has a long-standing bug with platform-specific optional deps
        # (rollup/rspack native bindings) when the committed lockfile was
        # generated on another OS — npm/cli#4828. Regenerating on the Linux
        # runner installs the correct linux-x64 bindings reliably.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: 🛠️ Build
        run: npm run build

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
