name: Regenerate resource data

# Parses README.md -> docs/data.json (the canonical resource database that
# powers both the legacy static page and the new Docusaurus Learning Hub).
# Deployment is handled separately by deploy-website.yml, which triggers when
# docs/data.json changes.

on:
  push:
    branches: [master, main]
    paths:
      - 'README.md'
      - 'QuantumResources.ipynb'
      - 'update_docs.py'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Sundays at midnight UTC

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbformat jupyter

      - name: 🚀 Update documentation data
        run: |
          echo "🔄 Regenerating resource data..."
          # The parser exits non-zero if it finds no data (e.g. the README
          # structure changed). That must not fail the job — the existing
          # docs/data.json is left untouched in that case.
          python update_docs.py --verbose || echo "::warning::Parser extracted no data; docs/data.json left unchanged."
          if [ ! -f "docs/data.json" ]; then
            echo "❌ Error: data.json missing"
            exit 1
          fi
          echo "✅ data.json present"

      - name: 📊 Show statistics
        run: |
          python3 -c "
          import json
          with open('docs/data.json', 'r') as f:
              data = json.load(f)
          print('📚 Books:', data.get('total_books', 0))
          print('🧠 QML resources:', data.get('total_qml_resources', 0))
          print('🕒 Last update:', data.get('last_update', 'N/A'))
          "

      - name: 📝 Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Regenerate resource data from README.md [skip ci]" || echo "Nothing to commit"
            git push || echo "Push failed"
          fi
